<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adar ARCL — Starting checkout...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:linear-gradient(145deg,#0d1f15 0%,#0a1810 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  color:#fff;text-align:center;padding:24px;
}
.card{max-width:400px;width:100%}
.logo{
  width:60px;height:60px;background:#2EB87E;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;font-weight:700;color:#fff;
  margin:0 auto 20px;
  box-shadow:0 0 50px rgba(46,184,126,0.45);
}
h2{font-size:1.25rem;font-weight:600;margin-bottom:8px}
p{color:rgba(255,255,255,0.48);font-size:0.88rem;line-height:1.6;margin-bottom:28px}
.spinner{
  width:38px;height:38px;
  border:3px solid rgba(46,184,126,0.2);
  border-top-color:#2EB87E;
  border-radius:50%;margin:0 auto 20px;
  animation:spin 0.85s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.secure-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(46,184,126,0.1);border:1px solid rgba(46,184,126,0.25);
  color:#6ee7b7;padding:7px 16px;border-radius:100px;font-size:0.76rem;
  margin-bottom:16px;
}
.domain{color:rgba(255,255,255,0.2);font-size:0.72rem;margin-top:16px}
.error{color:#f87171;font-size:0.85rem;margin-top:16px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">আদর</div>
  <div class="secure-badge">🔒 Secure checkout</div>
  <h2>Starting your free trial...</h2>
  <p>Setting up your 14-day free trial.<br>You will be taken to our secure payment page.</p>
  <div class="spinner" id="spinner"></div>
  <p style="font-size:0.8rem;color:rgba(255,255,255,0.35)">
    Powered by Stripe · PCI DSS compliant<br>
    Your card will not be charged during the trial
  </p>
  <div class="domain">adar.agomoniai.com</div>
  <div class="error" id="err">Checkout link is missing. Please go back and try again.</div>
</div>
<script>
  const dest = sessionStorage.getItem('stripe_checkout_url');
  if (dest) {
    sessionStorage.removeItem('stripe_checkout_url'); // clean up
    setTimeout(() => {
      window.location.href = dest;
    }, 1400);
  } else {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('err').style.display = 'block';
  }
</script>
</body>
</html>
